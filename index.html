<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    >
    <title>Dunk Rise</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
<div id="funnyPopup" class="funny-popup">
    <img src="images/funny-popup.jpg" alt="Funny popup">
</div>
    
</head>
<body>
    <div id="app">
        <div id="hud">
            <div class="hud-left">
                <button class="circle-btn" id="homeBtn">⌂</button>

                <div class="hud-stat trophy-stat">
                    <span class="hud-icon">🏆</span>
                    <span id="bestScore">244</span>
                </div>
            </div>

            <div class="hud-right">
                <div class="hud-stat stars-stat">
                    <span class="hud-icon">⭐</span>
                    <span id="stars">930</span>
                </div>

                <button class="circle-btn" id="restartBtn">↻</button>
            </div>
        </div>

        <div id="centerScore">0</div>

        <canvas id="game"></canvas>

        <div id="bottomLeft">
            <button class="floating-btn" id="shopBtn">Skins</button>
        </div>

        <div id="comboText"></div>

        <div id="shopModal" class="hidden">
            <div class="modal-card">
                <div class="modal-title">Skins</div>
                <div id="skinsList"></div>
                <button id="closeShopBtn" class="close-btn">Close</button>
            </div>
        </div>
    </div>

<script type="module" src="./game.js"></script>
</body>
</html>
